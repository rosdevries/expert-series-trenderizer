name: Weekly data refresh

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest (last 30 days)
        env:
          ON24_CLIENT_ID: ${{ secrets.ON24_CLIENT_ID }}
          ON24_TOKEN_KEY: ${{ secrets.ON24_TOKEN_KEY }}
          ON24_TOKEN_SECRET: ${{ secrets.ON24_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m trenderizer.ingest

      - name: Commit and push refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ vocab/company_domains.json
          git diff --staged --quiet && echo "No new data." || \
            git commit -m "Auto-refresh: weekly ingest $(date -u +%Y-%m-%d)" && git push
